<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{Your Project Display Name}</title>

  <!-- ① 原子トークン（不変） -->
  <link rel="stylesheet" href="../../primitives.css">
  <!-- ② 役割トークン（不変） -->
  <link rel="stylesheet" href="../../semantic.css">
  <!-- ③ プロファイル可変層（base + 自プロファイル1つでOK） -->
  <link rel="stylesheet" href="../../tokens/base.css">
  <link rel="stylesheet" href="../../tokens/profile-consumer.css">
  <!-- ④ 見本部品（必要に応じて） -->
  <link rel="stylesheet" href="../../tokens/components.css">
  <!-- ⑤ プロジェクト固有スタイル（任意） -->
  <link rel="stylesheet" href="./styles/extensions.css">
</head>

<!-- プロファイルクラスを <body> または最上位コンテナに付与 -->
<body class="fig-profile-consumer">
  <main class="fig-container fig-stack">

    <header class="fig-stack--tight">
      <h1 class="fig-display">{Your Project Display Name}</h1>
      <p class="fig-body">FIG Universal Design System のテンプレートから生成。<br>このファイルを基点に開発を進めてください。</p>
    </header>

    <article class="fig-card">
      <h2 class="fig-card__title">サンプルカード</h2>
      <p class="fig-card__body">
        本テンプレートは Mobile-Consumer プロファイルを既定にしています。
        Admin / Terminal に変更する場合は、<code>&lt;body&gt;</code> の class と
        読み込む <code>profile-*.css</code> を入れ替えてください。
      </p>
    </article>

    <div class="fig-cluster">
      <button class="fig-button">主要 CTA</button>
      <button class="fig-button fig-button--secondary">セカンダリ</button>
    </div>

    <input class="fig-input" placeholder="検索キーワード…">

    <ul class="fig-list">
      <li class="fig-list-item">サンプル行 1</li>
      <li class="fig-list-item">サンプル行 2</li>
      <li class="fig-list-item">サンプル行 3</li>
    </ul>

  </main>
</body>
</html>
