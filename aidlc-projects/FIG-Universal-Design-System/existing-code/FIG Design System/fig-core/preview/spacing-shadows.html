<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Spacing — Shadows</title>
<link rel="stylesheet" href="../primitives.css">
<style>
  body { margin: 0; padding: 24px; background: linear-gradient(135deg,#E6EEED,#F0F4F4,#E9F0EF); display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .card { background: #fff; height: 80px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .name { font-size: 11px; font-weight: 700; color: #334155; }
  .val { font-size: 10px; color: #94A3B8; font-family: var(--font-mono); }
  .pass { background: linear-gradient(135deg,#26B7BC,#5CCED2,#1A8589); color:#fff; }
  .pass .name { color:#fff }
  .pass .val { color: #fff8 }
</style>
</head>
<body>
  <div class="card" style="box-shadow: 0 4px 30px rgba(0,0,0,0.03);"><div class="name">header</div><div class="val">0 4 30 / 3%</div></div>
  <div class="card" style="box-shadow: 0 2px 16px rgba(0,0,0,0.06);"><div class="name">tab-active</div><div class="val">0 2 16 / 6%</div></div>
  <div class="card" style="box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);"><div class="name">card-hover</div><div class="val">lg</div></div>
  <div class="card pass" style="box-shadow: 0 20px 50px rgba(38, 183, 188,0.25);"><div class="name">pass-card</div><div class="val">teal 25%</div></div>
  <div class="card" style="background:#1E293BE6;color:#fff;box-shadow: 0 8px 30px rgba(0,0,0,0.12);"><div class="name" style="color:#fff">fab</div><div class="val" style="color:#fff8">0 8 30 / 12%</div></div>
  <div class="card" style="background:#26B7BC;color:#fff;box-shadow: 0 8px 30px rgba(38, 183, 188,0.20);"><div class="name" style="color:#fff">cta</div><div class="val" style="color:#fff8">teal 20%</div></div>
</body>
</html>
