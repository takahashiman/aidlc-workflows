<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Inputs</title>
<link rel="stylesheet" href="../primitives.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 18px; background: #fff; display: flex; flex-direction: column; gap: 14px; }
  .field { position: relative; max-width: 420px; }
  select, input { appearance: none; width: 100%; padding: 12px 16px; padding-right: 40px; border: 2px solid #D1D5DB; border-radius: 12px; font-size: 15px; font-weight: 500; color: #111827; background: #fff; outline: none; font-family: var(--font-sans); box-sizing: border-box; }
  input:focus, select:focus { border-color: transparent; box-shadow: 0 0 0 2px #3B82F6; }
  .chev { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #6B7280; pointer-events: none; }
  .chev svg { width: 20px; height: 20px; }
  .label { font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
</style>
</head>
<body>
  <div>
    <div class="label">REGION</div>
    <div class="field">
      <select><option>京都府</option><option>兵庫県</option></select>
      <span class="chev"><i data-lucide="chevron-down"></i></span>
    </div>
  </div>
  <div>
    <div class="label">乗車地</div>
    <div class="field">
      <input value="渋谷駅前" placeholder="バス停を選択">
      <span class="chev"><i data-lucide="map-pin"></i></span>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
