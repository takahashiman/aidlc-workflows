<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — List Row</title>
<link rel="stylesheet" href="../primitives.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 18px; background: #fff; }
  .list { background: #fff; border: 1px solid #F1F5F9; border-radius: 16px; overflow: hidden; max-width: 480px; }
  .eyebrow { font-size: 11px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 16px 6px; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
  .row:hover { background: #F8FAFC; }
  .left { display: flex; align-items: center; gap: 12px; color: #334155; }
  .left .ic { color: #94A3B8; }
  .left .ic svg { width: 20px; height: 20px; }
  .label { font-weight: 500; font-size: 14px; }
  .right { display: flex; align-items: center; gap: 8px; color: #CBD5E1; }
  .right svg { width: 16px; height: 16px; }
  .pill { background: rgba(38, 183, 188,0.10); color: #26B7BC; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; }
</style>
</head>
<body>
  <div class="list">
    <div class="eyebrow">設定</div>
    <div class="row">
      <div class="left"><span class="ic"><i data-lucide="map-pin"></i></span><span class="label">地域設定</span></div>
      <div class="right"><span class="pill">京都</span><i data-lucide="chevron-right"></i></div>
    </div>
    <div class="row">
      <div class="left"><span class="ic"><i data-lucide="settings"></i></span><span class="label">アプリ設定</span></div>
      <div class="right"><i data-lucide="chevron-right"></i></div>
    </div>
    <div class="row">
      <div class="left"><span class="ic"><i data-lucide="bell"></i></span><span class="label">通知設定</span></div>
      <div class="right"><i data-lucide="chevron-right"></i></div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
