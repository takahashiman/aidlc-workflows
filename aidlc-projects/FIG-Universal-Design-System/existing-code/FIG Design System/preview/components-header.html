<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Header / Footer</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: flex; flex-direction: column; gap: var(--space-6, 24px); }
  .stage { background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); overflow: hidden; }
  .stage__label { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); padding: var(--space-3, 12px) var(--space-4, 16px); border-bottom: 1px dashed var(--color-border-subtle, #E2E8F0); }

  /* Header */
  .app-header { display: flex; align-items: center; gap: var(--space-4, 16px); padding: var(--space-4, 16px) var(--space-5, 20px); background: var(--color-surface-default, #FFFFFF); border-bottom: 1px solid var(--color-border-subtle, #E2E8F0); }
  .app-header__brand { display: flex; align-items: center; gap: var(--space-2, 8px); font-weight: 700; font-size: var(--text-base, 16px); color: var(--color-text-primary, #0F172A); }
  .app-header__mark { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, var(--color-brand-secondary, #34D399), var(--color-brand-primary, #26B7BC)); display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 11px; }
  .app-header__nav { display: flex; gap: var(--space-2, 8px); margin-left: var(--space-4, 16px); }
  .app-header__nav a { padding: var(--space-2, 8px) var(--space-3, 12px); border-radius: 8px; color: var(--color-text-secondary, #475569); text-decoration: none; font-size: var(--text-sm, 14px); }
  .app-header__nav a[aria-current="page"] { background: var(--color-surface-subtle, #F1F5F9); color: var(--color-text-primary, #0F172A); font-weight: 600; }
  .app-header__spacer { flex: 1; }
  .app-header__actions { display: flex; gap: var(--space-2, 8px); align-items: center; }
  .icon-btn { width: 40px; height: 40px; border-radius: 10px; background: transparent; border: none; color: var(--color-text-secondary, #475569); display: grid; place-items: center; cursor: pointer; }
  .icon-btn:hover { background: var(--color-surface-subtle, #F1F5F9); }
  .icon-btn svg { width: 18px; height: 18px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-brand-primary, #26B7BC); color: #fff; display: grid; place-items: center; font-size: var(--text-xs, 12px); font-weight: 700; }

  /* Footer */
  .app-footer { padding: var(--space-6, 24px) var(--space-5, 20px); background: var(--color-surface-inverse, #0F172A); color: var(--color-text-inverse, #F8FAFC); display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: var(--space-5, 20px); }
  .app-footer__col h4 { margin: 0 0 var(--space-3, 12px); font-size: var(--text-xs, 12px); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: #94A3B8; }
  .app-footer__col a { display: block; padding: var(--space-1, 4px) 0; color: #CBD5E1; text-decoration: none; font-size: var(--text-sm, 14px); }
  .app-footer__col a:hover { color: #fff; }
  .app-footer__brand p { margin: var(--space-2, 8px) 0 0; font-size: var(--text-xs, 12px); color: #94A3B8; line-height: var(--lh-jp-body, 1.75); }

  @media (max-width: 700px) {
    .app-footer { grid-template-columns: 1fr 1fr; }
    .app-footer__brand { grid-column: 1 / -1; }
    .app-header__nav { display: none; }
    .app-header { gap: var(--space-2, 8px); padding: var(--space-3, 12px) var(--space-4, 16px); }
  }
  @media (max-width: 480px) {
    .app-footer { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="stage__label">Header — グローバルナビゲーション（PC / Tablet）</div>
    <header class="app-header" role="banner">
      <div class="app-header__brand">
        <span class="app-header__mark">FIG</span>
        <span>FIG Portal</span>
      </div>
      <nav class="app-header__nav" aria-label="メイン">
        <a href="#" aria-current="page">ダッシュボード</a>
        <a href="#">路線管理</a>
        <a href="#">運行状況</a>
        <a href="#">レポート</a>
      </nav>
      <div class="app-header__spacer"></div>
      <div class="app-header__actions">
        <button class="icon-btn" aria-label="検索"><i data-lucide="search"></i></button>
        <button class="icon-btn" aria-label="通知"><i data-lucide="bell"></i></button>
        <div class="avatar" aria-label="ユーザー">MT</div>
      </div>
    </header>
  </div>

  <div class="stage">
    <div class="stage__label">Footer — 補助情報・規約・コンタクト</div>
    <footer class="app-footer" role="contentinfo">
      <div class="app-footer__col app-footer__brand">
        <h4>FIG Design System</h4>
        <p>慈愛・スピード・俯瞰を体現する、モバイルクリエイトのデザイン基盤。</p>
      </div>
      <div class="app-footer__col">
        <h4>Product</h4>
        <a href="#">Core</a>
        <a href="#">Extensions</a>
        <a href="#">Roadmap</a>
      </div>
      <div class="app-footer__col">
        <h4>Resources</h4>
        <a href="#">Getting Started</a>
        <a href="#">Contribute</a>
        <a href="#">Release Notes</a>
      </div>
      <div class="app-footer__col">
        <h4>Legal</h4>
        <a href="#">利用規約</a>
        <a href="#">プライバシー</a>
        <a href="#">© 2026 MC Inc.</a>
      </div>
    </footer>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
