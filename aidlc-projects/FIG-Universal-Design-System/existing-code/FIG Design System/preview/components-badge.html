<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Badge</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: flex; flex-direction: column; gap: var(--space-5, 20px); }
  .stage { background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); padding: var(--space-5, 20px); }
  .label { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); margin-bottom: var(--space-3, 12px); }
  .row { display: flex; flex-wrap: wrap; gap: var(--space-5, 20px); align-items: center; }
  .cell { display: flex; flex-direction: column; gap: var(--space-2, 8px); align-items: center; }
  .cell__name { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); }

  /* Standalone badge */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px var(--space-2, 8px); border-radius: 999px; font-size: var(--text-xs, 12px); font-weight: 700; line-height: 1.5; }
  .badge--default  { background: var(--color-surface-subtle, #F1F5F9); color: var(--color-text-muted, #64748B); }
  .badge--brand    { background: var(--color-surface-brand-soft, #E0F5F5); color: var(--color-text-brand, #0E7C80); }
  .badge--success  { background: #DCFCE7; color: #166534; }
  .badge--warning  { background: #FEF3C7; color: #92400E; }
  .badge--error    { background: #FEE2E2; color: #991B1B; }
  .badge--info     { background: #DBEAFE; color: #1E40AF; }
  .badge--filled   { background: var(--color-surface-brand, #26B7BC); color: #fff; }
  .badge--inverse  { background: var(--color-surface-inverse, #0F172A); color: #fff; }
  .badge svg { width: 12px; height: 12px; }

  /* Anchor (notification dot / count) */
  .anchor { position: relative; display: inline-block; }
  .anchor__host { width: 40px; height: 40px; background: var(--color-surface-subtle, #F1F5F9); border-radius: 12px; display: grid; place-items: center; color: var(--color-text-secondary, #475569); }
  .anchor__host svg { width: 20px; height: 20px; }
  .badge--dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; padding: 0; background: var(--color-feedback-error-strong, #DC2626); border: 2px solid var(--color-surface-default, #FFFFFF); border-radius: 50%; }
  .badge--count { position: absolute; top: -6px; right: -8px; min-width: 18px; height: 18px; padding: 0 5px; background: var(--color-feedback-error-strong, #DC2626); color: #fff; font-size: 10px; line-height: 18px; border-radius: 999px; text-align: center; border: 2px solid var(--color-surface-default, #FFFFFF); display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

  <div class="stage">
    <div class="label">カラーバリアント（独立配置）</div>
    <div class="row">
      <div class="cell"><span class="badge badge--default">Default</span><span class="cell__name">中立</span></div>
      <div class="cell"><span class="badge badge--brand">Brand</span><span class="cell__name">ブランド</span></div>
      <div class="cell"><span class="badge badge--success">Success</span><span class="cell__name">成功</span></div>
      <div class="cell"><span class="badge badge--warning">Warning</span><span class="cell__name">注意</span></div>
      <div class="cell"><span class="badge badge--error">Error</span><span class="cell__name">エラー</span></div>
      <div class="cell"><span class="badge badge--info">Info</span><span class="cell__name">情報</span></div>
      <div class="cell"><span class="badge badge--filled">Filled</span><span class="cell__name">塗りつぶし</span></div>
      <div class="cell"><span class="badge badge--inverse">Inverse</span><span class="cell__name">反転</span></div>
    </div>
  </div>

  <div class="stage">
    <div class="label">アイコン併設 / 状態表示</div>
    <div class="row">
      <div class="cell"><span class="badge badge--success"><i data-lucide="check"></i>承認済</span></div>
      <div class="cell"><span class="badge badge--warning"><i data-lucide="alert-triangle"></i>要確認</span></div>
      <div class="cell"><span class="badge badge--error"><i data-lucide="x"></i>却下</span></div>
      <div class="cell"><span class="badge badge--brand"><i data-lucide="zap"></i>新着</span></div>
      <div class="cell"><span class="badge badge--info"><i data-lucide="clock"></i>処理中</span></div>
    </div>
  </div>

  <div class="stage">
    <div class="label">アンカー型（数値・ドット）</div>
    <div class="row">
      <div class="cell">
        <div class="anchor">
          <div class="anchor__host"><i data-lucide="bell"></i></div>
          <span class="badge--dot" aria-label="未読あり"></span>
        </div>
        <span class="cell__name">Dot（未読あり）</span>
      </div>
      <div class="cell">
        <div class="anchor">
          <div class="anchor__host"><i data-lucide="mail"></i></div>
          <span class="badge--count">3</span>
        </div>
        <span class="cell__name">Count: 3</span>
      </div>
      <div class="cell">
        <div class="anchor">
          <div class="anchor__host"><i data-lucide="inbox"></i></div>
          <span class="badge--count">12</span>
        </div>
        <span class="cell__name">Count: 12</span>
      </div>
      <div class="cell">
        <div class="anchor">
          <div class="anchor__host"><i data-lucide="message-square"></i></div>
          <span class="badge--count" aria-label="99 件以上の未読">99+</span>
        </div>
        <span class="cell__name">Count: 99+</span>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
