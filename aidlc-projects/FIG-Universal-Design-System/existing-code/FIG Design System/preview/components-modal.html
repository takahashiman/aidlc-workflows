<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Modal / Dialog</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5, 20px); }
  @media (max-width: 600px) {
    body { grid-template-columns: 1fr; padding: var(--space-4, 16px); }
  }

  .stage { position: relative; min-height: 360px; background: linear-gradient(180deg, #E0F2FE 0%, #F1F5F9 100%); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); overflow: hidden; }
  .stage__label { position: absolute; top: var(--space-3, 12px); left: var(--space-4, 16px); font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); z-index: 1; }
  .stage__scrim { position: absolute; inset: 0; background: rgba(15,23,42,0.45); }

  .modal { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--color-surface-default, #FFFFFF); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: calc(100% - 48px); max-width: 420px; }
  .modal__header { padding: var(--space-5, 20px) var(--space-5, 20px) var(--space-3, 12px); display: flex; align-items: flex-start; gap: var(--space-3, 12px); }
  .modal__icon { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; flex-shrink: 0; }
  .modal__icon svg { width: 22px; height: 22px; }
  .modal__icon--info { background: #DBEAFE; color: #2563EB; }
  .modal__icon--danger { background: #FEE2E2; color: #DC2626; }
  .modal__icon--success { background: #DCFCE7; color: #16A34A; }
  .modal__title { margin: 0; font-size: var(--text-lg, 18px); font-weight: 700; color: var(--color-text-primary, #0F172A); }
  .modal__close { margin-left: auto; width: 32px; height: 32px; border: none; background: transparent; border-radius: 8px; cursor: pointer; color: var(--color-text-muted, #64748B); display: grid; place-items: center; flex-shrink: 0; }
  .modal__close:hover { background: var(--color-surface-subtle, #F1F5F9); }
  .modal__close svg { width: 16px; height: 16px; }

  .modal__body { padding: 0 var(--space-5, 20px) var(--space-4, 16px); font-size: var(--text-sm, 14px); color: var(--color-text-secondary, #475569); line-height: var(--lh-jp-body, 1.75); }
  .modal__footer { padding: var(--space-3, 12px) var(--space-5, 20px) var(--space-5, 20px); display: flex; gap: var(--space-3, 12px); justify-content: flex-end; }

  .btn { padding: var(--space-3, 12px) var(--space-5, 20px); border-radius: 14px; border: none; font-weight: 600; font-family: inherit; cursor: pointer; font-size: var(--text-sm, 14px); min-height: 44px; }
  .btn--secondary { background: transparent; color: var(--color-text-secondary, #475569); }
  .btn--secondary:hover { background: var(--color-surface-subtle, #F1F5F9); }
  .btn--primary { background: var(--color-surface-brand, #26B7BC); color: #fff; }
  .btn--danger { background: var(--color-feedback-error-strong, #DC2626); color: #fff; }

  /* Fullscreen (mobile) */
  .stage--fs { grid-column: 1 / -1; min-height: 480px; }
  .modal--fs { position: absolute; inset: 12px; transform: none; left: auto; top: auto; max-width: none; width: auto; display: flex; flex-direction: column; border-radius: 16px; }
  .modal--fs .modal__body { flex: 1; overflow-y: auto; }

  .field-set { padding: var(--space-3, 12px) 0; }
  .field-set label { display: block; font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); margin-bottom: 6px; }
  .field-set input { width: 100%; padding: var(--space-3, 12px); border: 2px solid var(--color-border-subtle, #E2E8F0); border-radius: 10px; font-family: inherit; font-size: var(--text-sm, 14px); box-sizing: border-box; }
</style>
</head>
<body>

  <div class="stage">
    <div class="stage__label">Confirmation — 標準</div>
    <div class="stage__scrim"></div>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m1-title">
      <div class="modal__header">
        <div class="modal__icon modal__icon--info"><i data-lucide="help-circle"></i></div>
        <h2 class="modal__title" id="m1-title">変更を保存しますか?</h2>
        <button class="modal__close" aria-label="閉じる"><i data-lucide="x"></i></button>
      </div>
      <div class="modal__body">未保存の変更があります。このページを離れると変更内容は失われます。</div>
      <div class="modal__footer">
        <button class="btn btn--secondary">破棄</button>
        <button class="btn btn--primary">保存する</button>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="stage__label">Destructive — 取消困難な操作</div>
    <div class="stage__scrim"></div>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m2-title">
      <div class="modal__header">
        <div class="modal__icon modal__icon--danger"><i data-lucide="trash-2"></i></div>
        <h2 class="modal__title" id="m2-title">アカウントを削除</h2>
        <button class="modal__close" aria-label="閉じる"><i data-lucide="x"></i></button>
      </div>
      <div class="modal__body">この操作は <strong>取り消せません</strong>。保存されたお気に入り・予約履歴・登録カード情報がすべて削除されます。</div>
      <div class="modal__footer">
        <button class="btn btn--secondary">キャンセル</button>
        <button class="btn btn--danger">完全に削除する</button>
      </div>
    </div>
  </div>

  <div class="stage stage--fs">
    <div class="stage__label">Fullscreen — モバイル向け入力フォーム</div>
    <div class="stage__scrim"></div>
    <div class="modal modal--fs" role="dialog" aria-modal="true" aria-labelledby="m3-title">
      <div class="modal__header">
        <h2 class="modal__title" id="m3-title">新しい予約</h2>
        <button class="modal__close" aria-label="閉じる"><i data-lucide="x"></i></button>
      </div>
      <div class="modal__body">
        <div class="field-set">
          <label>出発地</label>
          <input value="渋谷駅前">
        </div>
        <div class="field-set">
          <label>到着地</label>
          <input value="新宿駅西口">
        </div>
        <div class="field-set">
          <label>乗車日時</label>
          <input value="2026年5月20日 09:30">
        </div>
        <div class="field-set">
          <label>人数</label>
          <input value="大人 1 名">
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--primary" style="flex: 1;">予約を確定する</button>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
