<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Placeholder — FIG Core DS</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: var(--space-6, 24px);
    background: var(--bg-app, #F8FAFC);
    font-family: var(--font-sans);
    color: var(--color-text-primary, #0F172A);
    display: grid;
    place-items: center;
  }
  .placeholder {
    width: 100%;
    max-width: 560px;
    background: var(--color-surface-default, #FFFFFF);
    border: 1px dashed var(--color-border-subtle, #CBD5E1);
    border-radius: var(--radius-lg, 16px);
    padding: var(--space-7, 32px) var(--space-6, 24px);
    text-align: center;
  }
  .placeholder__eyebrow {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2, 8px);
    padding: var(--space-1, 4px) var(--space-3, 12px);
    border-radius: 999px;
    background: var(--color-surface-subtle, #F1F5F9);
    color: var(--color-text-muted, #64748B);
    font-family: var(--font-mono);
    font-size: var(--text-xs, 12px);
    letter-spacing: var(--tracking-wide);
    margin-bottom: var(--space-4, 16px);
  }
  .placeholder__title {
    margin: 0 0 var(--space-2, 8px);
    font-size: var(--text-2xl, 24px);
    font-weight: 700;
    line-height: var(--lh-jp-headline, 1.4);
  }
  .placeholder__desc {
    margin: 0 0 var(--space-5, 20px);
    color: var(--color-text-secondary, #475569);
    font-size: var(--text-sm, 14px);
    line-height: var(--lh-jp-body, 1.75);
  }
  .placeholder__cta {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2, 8px);
    padding: var(--space-3, 12px) var(--space-5, 20px);
    border-radius: var(--radius-md, 12px);
    background: var(--color-surface-inverse, #0F172A);
    color: var(--color-text-inverse, #F8FAFC);
    text-decoration: none;
    font-weight: 600;
    font-size: var(--text-sm, 14px);
  }
  .placeholder__cta:hover { filter: brightness(1.1); }
  .placeholder__meta {
    margin-top: var(--space-5, 20px);
    font-family: var(--font-mono);
    font-size: var(--text-xs, 12px);
    color: var(--color-text-tertiary, #94A3B8);
    word-break: break-all;
  }
</style>
</head>
<body>
  <div class="placeholder" role="status" aria-live="polite">
    <div class="placeholder__eyebrow" id="eyebrow">PLACEHOLDER · 準備中</div>
    <h1 class="placeholder__title" id="title">Component</h1>
    <p class="placeholder__desc" id="desc">
      このコンポーネントのライブプレビューは現在準備中です。設計図（コンポーネント配置マトリクス）には登録済で、実装フェーズで順次プレビュー HTML に置換されます。
    </p>
    <a class="placeholder__cta" id="cta" href="#" target="_top" hidden>
      Spec を開く →
    </a>
    <div class="placeholder__meta" id="meta"></div>
  </div>

<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var name = params.get('name') || 'Component';
    var spec = params.get('spec');

    document.title = name + ' — Placeholder';
    document.getElementById('title').textContent = name;

    var meta = document.getElementById('meta');
    meta.textContent = spec ? ('spec: ' + spec) : 'spec: 未策定';

    if (spec) {
      var cta = document.getElementById('cta');
      cta.href = '../' + spec;
      cta.hidden = false;
    }
  })();
</script>
</body>
</html>
