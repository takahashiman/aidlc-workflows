<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Brand — Logo</title>
<link rel="stylesheet" href="../primitives.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 18px; }
  .panel { padding: 14px 18px; border-radius: 14px; display: flex; align-items: center; gap: 14px; }
  .light { background: #fff; border: 1px solid #E2E8F0; }
  .glass { background: linear-gradient(135deg,#E6EEED,#F0F4F4,#E9F0EF); }
  .dark { background: #1A8589; }
  .dark .word { color: #fff; }
  .dark .sub { color: rgba(255,255,255,0.6); }
  .ic { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg,#26B7BC,#1A8589); display: flex; align-items: center; justify-content: center; }
  .word { font-size: 20px; font-weight: 800; color: #1E293B; letter-spacing: -0.02em; }
  .sub { font-size: 9px; font-weight: 600; color: #64748B; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="panel light">
      <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="3"/><path d="M4 13h16"/><circle cx="8" cy="16" r="1.4" fill="#fff"/><circle cx="16" cy="16" r="1.4" fill="#fff"/><path d="M8 3V1M16 3V1"/></svg></div>
      <div><div class="word">バスアプリ</div><div class="sub">BUS DELAY INFO</div></div>
    </div>
    <div class="panel glass">
      <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="3"/><path d="M4 13h16"/><circle cx="8" cy="16" r="1.4" fill="#fff"/><circle cx="16" cy="16" r="1.4" fill="#fff"/><path d="M8 3V1M16 3V1"/></svg></div>
      <div><div class="word">バスアプリ</div><div class="sub">BUS DELAY INFO</div></div>
    </div>
    <div class="panel dark">
      <div class="ic" style="background:rgba(255,255,255,0.15)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="3"/><path d="M4 13h16"/><circle cx="8" cy="16" r="1.4" fill="#fff"/><circle cx="16" cy="16" r="1.4" fill="#fff"/><path d="M8 3V1M16 3V1"/></svg></div>
      <div><div class="word">バスアプリ</div><div class="sub">BUS DELAY INFO</div></div>
    </div>
  </div>
</body>
</html>
