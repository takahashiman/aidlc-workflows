<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Date / Time Picker</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5, 20px); align-items: start; }
  @media (max-width: 600px) {
    body { grid-template-columns: 1fr; padding: var(--space-4, 16px); }
    .field-row { grid-template-columns: 1fr !important; }
  }
  .stage { background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); padding: var(--space-5, 20px); }
  .label { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); margin-bottom: var(--space-3, 12px); }

  .field { display: flex; align-items: center; gap: var(--space-3, 12px); padding: var(--space-3, 12px) var(--space-4, 16px); border: 2px solid var(--color-border-subtle, #E2E8F0); border-radius: 12px; background: var(--color-surface-default, #FFFFFF); cursor: pointer; }
  .field svg { width: 18px; height: 18px; color: var(--color-text-muted, #64748B); }
  .field__value { flex: 1; font-size: var(--text-sm, 14px); color: var(--color-text-primary, #0F172A); }
  .field__caret { color: var(--color-text-tertiary, #94A3B8); }

  /* Date Picker (Calendar) */
  .cal { width: 100%; }
  .cal__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-3, 12px); }
  .cal__title { font-weight: 700; font-size: var(--text-base, 16px); color: var(--color-text-primary, #0F172A); }
  .cal__nav { display: flex; gap: 2px; }
  .cal__nav button { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; cursor: pointer; color: var(--color-text-secondary, #475569); display: grid; place-items: center; }
  .cal__nav button:hover { background: var(--color-surface-subtle, #F1F5F9); }
  .cal__nav svg { width: 16px; height: 16px; }

  .cal__grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .cal__dow { font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); padding: var(--space-2, 8px) 0; font-weight: 600; }
  .cal__cell { height: 36px; display: grid; place-items: center; border-radius: 8px; cursor: pointer; font-size: var(--text-sm, 14px); color: var(--color-text-primary, #0F172A); }
  .cal__cell:hover:not(.cal__cell--off):not(.cal__cell--selected) { background: var(--color-surface-subtle, #F1F5F9); }
  .cal__cell--off { color: var(--color-text-tertiary, #CBD5E1); }
  .cal__cell--today { font-weight: 700; color: var(--color-text-brand, #0E7C80); }
  .cal__cell--selected { background: var(--color-surface-brand, #26B7BC); color: #fff; font-weight: 700; }
  .cal__cell--range { background: var(--color-surface-brand-soft, #E0F5F5); border-radius: 0; }

  /* Time picker */
  .time { display: flex; align-items: center; justify-content: center; gap: var(--space-3, 12px); padding: var(--space-5, 20px) 0; }
  .time__col { display: flex; flex-direction: column; align-items: center; gap: var(--space-2, 8px); }
  .time__col button { width: 28px; height: 28px; border-radius: 6px; background: transparent; border: none; cursor: pointer; color: var(--color-text-muted, #64748B); }
  .time__col button:hover { background: var(--color-surface-subtle, #F1F5F9); }
  .time__col svg { width: 14px; height: 14px; }
  .time__val { font-size: var(--text-3xl, 32px); font-weight: 700; color: var(--color-text-primary, #0F172A); font-family: var(--font-mono); min-width: 56px; text-align: center; background: var(--color-surface-subtle, #F1F5F9); padding: var(--space-2, 8px) var(--space-3, 12px); border-radius: 10px; }
  .time__sep { font-size: var(--text-3xl, 32px); font-weight: 700; color: var(--color-text-tertiary, #94A3B8); }
</style>
</head>
<body>

  <div class="stage" style="grid-column: 1 / -1;">
    <div class="label">フィールド表示（クローズ状態）</div>
    <div class="field-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4, 16px);">
      <div>
        <div style="font-size: 12px; color: var(--color-text-muted, #64748B); margin-bottom: 6px;">乗車日</div>
        <div class="field"><i data-lucide="calendar"></i><span class="field__value">2026年5月18日（月）</span><i data-lucide="chevron-down" class="field__caret"></i></div>
      </div>
      <div>
        <div style="font-size: 12px; color: var(--color-text-muted, #64748B); margin-bottom: 6px;">出発時刻</div>
        <div class="field"><i data-lucide="clock"></i><span class="field__value">09:30</span><i data-lucide="chevron-down" class="field__caret"></i></div>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="label">Date Picker（カレンダー展開）</div>
    <div class="cal">
      <div class="cal__header">
        <div class="cal__title">2026年5月</div>
        <div class="cal__nav">
          <button aria-label="前月"><i data-lucide="chevron-left"></i></button>
          <button aria-label="翌月"><i data-lucide="chevron-right"></i></button>
        </div>
      </div>
      <div class="cal__grid">
        <div class="cal__dow">日</div><div class="cal__dow">月</div><div class="cal__dow">火</div><div class="cal__dow">水</div><div class="cal__dow">木</div><div class="cal__dow">金</div><div class="cal__dow">土</div>

        <div class="cal__cell cal__cell--off">27</div><div class="cal__cell cal__cell--off">28</div><div class="cal__cell cal__cell--off">29</div><div class="cal__cell cal__cell--off">30</div>
        <div class="cal__cell">1</div><div class="cal__cell">2</div><div class="cal__cell">3</div>
        <div class="cal__cell">4</div><div class="cal__cell">5</div><div class="cal__cell">6</div><div class="cal__cell">7</div><div class="cal__cell">8</div><div class="cal__cell">9</div><div class="cal__cell">10</div>
        <div class="cal__cell">11</div><div class="cal__cell">12</div><div class="cal__cell">13</div><div class="cal__cell">14</div><div class="cal__cell">15</div><div class="cal__cell">16</div><div class="cal__cell">17</div>
        <div class="cal__cell cal__cell--selected">18</div><div class="cal__cell">19</div><div class="cal__cell">20</div><div class="cal__cell">21</div><div class="cal__cell">22</div><div class="cal__cell">23</div><div class="cal__cell">24</div>
        <div class="cal__cell">25</div><div class="cal__cell">26</div><div class="cal__cell">27</div><div class="cal__cell">28</div><div class="cal__cell">29</div><div class="cal__cell">30</div><div class="cal__cell">31</div>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="label">Time Picker（数字ドラム）</div>
    <div class="time">
      <div class="time__col">
        <button aria-label="時を増やす"><i data-lucide="chevron-up"></i></button>
        <div class="time__val">09</div>
        <button aria-label="時を減らす"><i data-lucide="chevron-down"></i></button>
      </div>
      <div class="time__sep">:</div>
      <div class="time__col">
        <button aria-label="分を増やす"><i data-lucide="chevron-up"></i></button>
        <div class="time__val">30</div>
        <button aria-label="分を減らす"><i data-lucide="chevron-down"></i></button>
      </div>
    </div>
    <p style="margin: 0; font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); text-align: center;">スマホでは縦スクロール、PC では矢印キー / 数字入力</p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
