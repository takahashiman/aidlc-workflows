<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Navigation Rail</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: flex; gap: var(--space-6, 24px); align-items: flex-start; }
  .rail { width: 80px; background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); padding: var(--space-3, 12px) var(--space-2, 8px); display: flex; flex-direction: column; align-items: center; gap: var(--space-2, 8px); }
  .rail__brand { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--color-brand-secondary, #34D399), var(--color-brand-primary, #26B7BC)); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 13px; margin-bottom: var(--space-2, 8px); }
  .rail__fab { width: 56px; height: 56px; border-radius: 16px; background: var(--color-surface-brand, #26B7BC); color: #fff; border: none; display: grid; place-items: center; cursor: pointer; box-shadow: var(--surface-elevation-floating, 0 4px 16px rgba(0,0,0,0.12)); margin-bottom: var(--space-3, 12px); }
  .rail__fab svg { width: 22px; height: 22px; }
  .rail__item { width: 56px; padding: var(--space-2, 8px) 0; border-radius: 14px; background: transparent; border: none; color: var(--color-text-secondary, #475569); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-family: inherit; font-size: var(--text-xs, 12px); text-decoration: none; }
  .rail__item:hover { background: var(--color-surface-subtle, #F1F5F9); }
  .rail__item svg { width: 22px; height: 22px; }
  .rail__item[aria-current="page"] { color: var(--color-text-brand, #0E7C80); font-weight: 600; }
  .rail__item[aria-current="page"] .rail__indicator { background: var(--color-surface-brand-soft, #E0F5F5); padding: var(--space-1, 4px) var(--space-4, 16px); border-radius: 16px; color: var(--color-text-brand, #0E7C80); }
  .rail__item .rail__indicator { padding: var(--space-1, 4px) var(--space-4, 16px); border-radius: 16px; display: grid; place-items: center; }
  .rail__label { font-size: 11px; }

  .panel { flex: 1; background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); padding: var(--space-6, 24px); min-height: 360px; }
  .panel h2 { margin: 0 0 var(--space-2, 8px); font-size: var(--text-xl, 20px); color: var(--color-text-primary, #0F172A); }
  .panel p { margin: 0; color: var(--color-text-secondary, #475569); font-size: var(--text-sm, 14px); line-height: var(--lh-jp-body, 1.75); }
  .meta { margin-top: var(--space-4, 16px); font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); }
</style>
</head>
<body>

  <nav class="rail" aria-label="メインナビゲーション">
    <div class="rail__brand">FIG</div>
    <button class="rail__fab" aria-label="新規作成"><i data-lucide="plus"></i></button>
    <a href="#" class="rail__item" aria-current="page">
      <span class="rail__indicator"><i data-lucide="layout-dashboard"></i></span>
      <span class="rail__label">概要</span>
    </a>
    <a href="#" class="rail__item">
      <span class="rail__indicator"><i data-lucide="route"></i></span>
      <span class="rail__label">路線</span>
    </a>
    <a href="#" class="rail__item">
      <span class="rail__indicator"><i data-lucide="bus"></i></span>
      <span class="rail__label">車両</span>
    </a>
    <a href="#" class="rail__item">
      <span class="rail__indicator"><i data-lucide="bar-chart-3"></i></span>
      <span class="rail__label">分析</span>
    </a>
    <a href="#" class="rail__item">
      <span class="rail__indicator"><i data-lucide="settings"></i></span>
      <span class="rail__label">設定</span>
    </a>
  </nav>

  <div class="panel">
    <h2>Navigation Rail</h2>
    <p>デスクトップ・タブレット向けの縦型ナビ。中密度のグローバル移動を担当します。アイコン下の小ラベルでスキャナビリティを担保し、選択中アイテムはインジケータピル（<code>--color-surface-brand-soft</code>）で識別。</p>
    <div class="meta">幅: 80px / アイテム高: 56px / インジケータ角丸: 16px</div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
