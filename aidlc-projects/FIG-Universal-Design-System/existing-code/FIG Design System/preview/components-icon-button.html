<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Icon Button</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: flex; flex-direction: column; gap: var(--space-5, 20px); }
  .stage { background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); padding: var(--space-5, 20px); }
  .label { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); margin-bottom: var(--space-3, 12px); }
  .row { display: flex; gap: var(--space-3, 12px); flex-wrap: wrap; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: var(--space-2, 8px); min-width: 80px; }
  .cell-name { font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); font-family: var(--font-mono); }

  .iconbtn { width: 48px; height: 48px; min-width: 48px; border: none; border-radius: 14px; background: transparent; cursor: pointer; display: grid; place-items: center; color: var(--color-text-secondary, #475569); font-family: inherit; transition: background 160ms ease; }
  .iconbtn:hover:not([disabled]) { background: var(--color-surface-subtle, #F1F5F9); color: var(--color-text-primary, #0F172A); }
  .iconbtn:active:not([disabled]) { transform: scale(0.96); }
  .iconbtn:focus-visible { outline: 2px solid var(--color-border-focus, #26B7BC); outline-offset: 2px; }
  .iconbtn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .iconbtn svg { width: 20px; height: 20px; }

  .iconbtn--filled  { background: var(--color-surface-brand, #26B7BC); color: #fff; }
  .iconbtn--filled:hover:not([disabled]) { background: var(--color-surface-brand, #26B7BC); filter: brightness(1.08); color: #fff; }
  .iconbtn--tonal   { background: var(--color-surface-brand-soft, #E0F5F5); color: var(--color-text-brand, #0E7C80); }
  .iconbtn--outline { background: transparent; border: 1px solid var(--color-border-strong, #CBD5E1); color: var(--color-text-secondary, #475569); }
  .iconbtn--danger  { color: var(--color-feedback-error-strong, #DC2626); }
  .iconbtn--danger:hover { background: #FEE2E2; }
  .iconbtn--toggled { background: var(--color-surface-brand-soft, #E0F5F5); color: var(--color-text-brand, #0E7C80); }

  .iconbtn--sm { width: 36px; height: 36px; min-width: 36px; border-radius: 10px; }
  .iconbtn--sm svg { width: 16px; height: 16px; }
  .iconbtn--lg { width: 56px; height: 56px; min-width: 56px; border-radius: 18px; }
  .iconbtn--lg svg { width: 26px; height: 26px; }
</style>
</head>
<body>

  <div class="stage">
    <div class="label">Variants</div>
    <div class="row">
      <div class="cell"><button class="iconbtn" aria-label="お気に入り"><i data-lucide="star"></i></button><span class="cell-name">Standard</span></div>
      <div class="cell"><button class="iconbtn iconbtn--filled" aria-label="新規"><i data-lucide="plus"></i></button><span class="cell-name">Filled</span></div>
      <div class="cell"><button class="iconbtn iconbtn--tonal" aria-label="編集"><i data-lucide="edit-3"></i></button><span class="cell-name">Tonal</span></div>
      <div class="cell"><button class="iconbtn iconbtn--outline" aria-label="共有"><i data-lucide="share-2"></i></button><span class="cell-name">Outline</span></div>
      <div class="cell"><button class="iconbtn iconbtn--danger" aria-label="削除"><i data-lucide="trash-2"></i></button><span class="cell-name">Danger</span></div>
    </div>
  </div>

  <div class="stage">
    <div class="label">States</div>
    <div class="row">
      <div class="cell"><button class="iconbtn" aria-label="通常"><i data-lucide="heart"></i></button><span class="cell-name">Default</span></div>
      <div class="cell"><button class="iconbtn" style="background: var(--color-surface-subtle, #F1F5F9);" aria-label="ホバー"><i data-lucide="heart"></i></button><span class="cell-name">Hover</span></div>
      <div class="cell"><button class="iconbtn iconbtn--toggled" aria-pressed="true" aria-label="選択済"><i data-lucide="heart"></i></button><span class="cell-name">Selected</span></div>
      <div class="cell"><button class="iconbtn" disabled aria-label="無効"><i data-lucide="heart"></i></button><span class="cell-name">Disabled</span></div>
    </div>
  </div>

  <div class="stage">
    <div class="label">Sizes</div>
    <div class="row">
      <div class="cell"><button class="iconbtn iconbtn--sm" aria-label="閉じる"><i data-lucide="x"></i></button><span class="cell-name">36×36</span></div>
      <div class="cell"><button class="iconbtn" aria-label="閉じる"><i data-lucide="x"></i></button><span class="cell-name">48×48</span></div>
      <div class="cell"><button class="iconbtn iconbtn--lg" aria-label="閉じる"><i data-lucide="x"></i></button><span class="cell-name">56×56</span></div>
    </div>
    <p style="margin: var(--space-3, 12px) 0 0; font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B);">タッチターゲット最小は 48×48 px。36×36 はマウス操作前提の領域のみ許容。</p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
