<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — FAB</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4, 16px); }
  @media (max-width: 420px) {
    body { padding: var(--space-3, 12px); grid-template-columns: 1fr; }
  }
  .stage { background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); padding: var(--space-5, 20px); display: flex; flex-direction: column; gap: var(--space-3, 12px); align-items: center; }
  .label { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); align-self: flex-start; }
  .desc { font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); text-align: center; }

  .fab { border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2, 8px); box-shadow: var(--surface-elevation-floating, 0 6px 16px rgba(0,0,0,0.14)); font-family: inherit; font-weight: 600; transition: transform 120ms ease, box-shadow 120ms ease; }
  .fab:hover { box-shadow: 0 10px 24px rgba(0,0,0,0.18); }
  .fab:active { transform: scale(0.96); }
  .fab svg { width: 22px; height: 22px; }

  .fab--regular { width: 56px; height: 56px; border-radius: 18px; background: var(--color-surface-brand, #26B7BC); color: #fff; }
  .fab--small   { width: 40px; height: 40px; border-radius: 12px; background: var(--color-surface-brand, #26B7BC); color: #fff; }
  .fab--large   { width: 96px; height: 96px; border-radius: 28px; background: var(--color-surface-brand, #26B7BC); color: #fff; }
  .fab--large svg { width: 36px; height: 36px; }
  .fab--extended { height: 56px; border-radius: 18px; background: var(--color-surface-brand, #26B7BC); color: #fff; padding: 0 var(--space-5, 20px); font-size: var(--text-sm, 14px); }

  .fab--surface { background: var(--color-surface-default, #FFFFFF); color: var(--color-text-brand, #0E7C80); border: 1px solid var(--color-border-subtle, #E2E8F0); }
</style>
</head>
<body>

  <div class="stage">
    <div class="label">Regular</div>
    <button class="fab fab--regular" aria-label="新規作成"><i data-lucide="plus"></i></button>
    <div class="desc">56×56 / 標準サイズ</div>
  </div>

  <div class="stage">
    <div class="label">Small</div>
    <button class="fab fab--small" aria-label="新規作成"><i data-lucide="plus"></i></button>
    <div class="desc">40×40 / 密度の高い画面向け</div>
  </div>

  <div class="stage">
    <div class="label">Large</div>
    <button class="fab fab--large" aria-label="新規作成"><i data-lucide="plus"></i></button>
    <div class="desc">96×96 / コンテンツの中心 CTA</div>
  </div>

  <div class="stage">
    <div class="label">Extended（ラベル付き）</div>
    <button class="fab fab--extended"><i data-lucide="edit-3"></i>新規投稿</button>
    <div class="desc">アイコン + テキスト併設</div>
  </div>

  <div class="stage">
    <div class="label">Surface（控えめ）</div>
    <button class="fab fab--regular fab--surface" aria-label="アクション"><i data-lucide="more-horizontal"></i></button>
    <div class="desc">主動線と競合しない補助用途</div>
  </div>

  <div class="stage">
    <div class="label">画面下端固定（参考配置）</div>
    <div style="position: relative; width: 180px; height: 220px; background: var(--color-surface-subtle, #F1F5F9); border-radius: 16px; overflow: hidden;">
      <button class="fab fab--regular" aria-label="新規" style="position: absolute; right: 12px; bottom: 12px;"><i data-lucide="plus"></i></button>
    </div>
    <div class="desc">右下に固定、safe-area を考慮</div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
