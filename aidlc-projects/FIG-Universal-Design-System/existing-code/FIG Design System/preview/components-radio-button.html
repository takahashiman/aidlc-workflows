<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Radio Button</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); display: flex; flex-direction: column; gap: var(--space-5, 20px); }
  .stage { background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); padding: var(--space-5, 20px); }
  .label { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-tertiary, #94A3B8); margin-bottom: var(--space-3, 12px); }

  .radio { display: inline-flex; align-items: center; gap: var(--space-3, 12px); cursor: pointer; min-height: 36px; }
  .radio input { position: absolute; opacity: 0; pointer-events: none; }
  .radio__circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--color-border-strong, #CBD5E1); background: var(--color-surface-default, #FFFFFF); display: grid; place-items: center; flex-shrink: 0; transition: all 160ms ease; position: relative; }
  .radio__circle::after { content: ""; width: 10px; height: 10px; border-radius: 50%; background: var(--color-surface-brand, #26B7BC); opacity: 0; transition: opacity 160ms ease; }
  .radio input:checked + .radio__circle { border-color: var(--color-surface-brand, #26B7BC); }
  .radio input:checked + .radio__circle::after { opacity: 1; }
  .radio input:focus-visible + .radio__circle { outline: 2px solid var(--color-border-focus, #26B7BC); outline-offset: 2px; }
  .radio input:disabled + .radio__circle { opacity: 0.4; }
  .radio__label { font-size: var(--text-sm, 14px); color: var(--color-text-primary, #0F172A); }
  .radio[data-disabled="true"] { cursor: not-allowed; }
  .radio[data-disabled="true"] .radio__label { opacity: 0.5; }

  .demo-row { display: flex; flex-wrap: wrap; gap: var(--space-5, 20px); }
  .demo-cell { display: flex; flex-direction: column; gap: var(--space-2, 8px); }
  .demo-cell__name { font-family: var(--font-mono); font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); }

  fieldset { border: none; padding: 0; margin: 0; }
  fieldset legend { font-weight: 700; color: var(--color-text-primary, #0F172A); margin-bottom: var(--space-3, 12px); }
  .group { display: flex; flex-direction: column; gap: var(--space-2, 8px); }

  /* Card-style radio */
  .radio-card { display: flex; align-items: flex-start; gap: var(--space-3, 12px); padding: var(--space-4, 16px); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: 14px; cursor: pointer; transition: border-color 160ms ease; }
  .radio-card:has(input:checked) { border-color: var(--color-surface-brand, #26B7BC); background: var(--color-surface-brand-soft, #E0F5F5); }
  .radio-card__body { display: flex; flex-direction: column; gap: 2px; }
  .radio-card__title { font-weight: 600; color: var(--color-text-primary, #0F172A); }
  .radio-card__desc { font-size: var(--text-xs, 12px); color: var(--color-text-muted, #64748B); line-height: 1.6; }
</style>
</head>
<body>

  <div class="stage">
    <div class="label">States</div>
    <div class="demo-row">
      <div class="demo-cell">
        <label class="radio"><input type="radio" name="demo1"><span class="radio__circle"></span></label>
        <span class="demo-cell__name">Unselected</span>
      </div>
      <div class="demo-cell">
        <label class="radio"><input type="radio" name="demo2" checked><span class="radio__circle"></span></label>
        <span class="demo-cell__name">Selected</span>
      </div>
      <div class="demo-cell">
        <label class="radio" data-disabled="true"><input type="radio" name="demo3" disabled><span class="radio__circle"></span></label>
        <span class="demo-cell__name">Disabled</span>
      </div>
      <div class="demo-cell">
        <label class="radio" data-disabled="true"><input type="radio" name="demo4" checked disabled><span class="radio__circle"></span></label>
        <span class="demo-cell__name">Selected + Disabled</span>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="label">標準（縦並び）</div>
    <fieldset>
      <legend>支払い方法を選択</legend>
      <div class="group">
        <label class="radio"><input type="radio" name="pay" checked><span class="radio__circle"></span><span class="radio__label">IC カード（Suica / PASMO）</span></label>
        <label class="radio"><input type="radio" name="pay"><span class="radio__circle"></span><span class="radio__label">QR コード決済</span></label>
        <label class="radio"><input type="radio" name="pay"><span class="radio__circle"></span><span class="radio__label">現金</span></label>
        <label class="radio" data-disabled="true"><input type="radio" name="pay" disabled><span class="radio__circle"></span><span class="radio__label">クレジットカード（準備中）</span></label>
      </div>
    </fieldset>
  </div>

  <div class="stage">
    <div class="label">カード型（説明文付き）</div>
    <fieldset>
      <legend>プラン選択</legend>
      <div class="group">
        <label class="radio-card">
          <input type="radio" name="plan" style="position: relative; opacity: 1; pointer-events: auto;" checked>
          <div class="radio-card__body">
            <div class="radio-card__title">スタンダード</div>
            <div class="radio-card__desc">月額 980 円 / 一般的な利用に最適。広告なし。</div>
          </div>
        </label>
        <label class="radio-card">
          <input type="radio" name="plan" style="position: relative; opacity: 1; pointer-events: auto;">
          <div class="radio-card__body">
            <div class="radio-card__title">プレミアム</div>
            <div class="radio-card__desc">月額 1,980 円 / オフラインマップ、優先サポート付き。</div>
          </div>
        </label>
      </div>
    </fieldset>
  </div>
</body>
</html>
