<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Type — Scale</title>
<link rel="stylesheet" href="../primitives.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; }
  .row { display: grid; grid-template-columns: 80px 1fr 80px; gap: 14px; align-items: baseline; padding: 4px 0; }
  .lab { font-size: 10px; color: var(--fg-5); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .meta { font-size: 10px; color: var(--fg-5); font-family: var(--font-mono); text-align: right; }
</style>
</head>
<body>
  <div class="row"><div class="lab">3xl · h1</div><div style="font-size:32px;font-weight:800;letter-spacing:-0.02em;color:#1E293B">渋谷駅 ↔ 六本木駅</div><div class="meta">32 / 800</div></div>
  <div class="row"><div class="lab">2xl · h2</div><div style="font-size:28px;font-weight:800;letter-spacing:-0.015em;color:#1E293B">¥210</div><div class="meta">28 / 800</div></div>
  <div class="row"><div class="lab">xl</div><div style="font-size:22px;font-weight:700;color:#1E293B">読み取りに失敗しました</div><div class="meta">22 / 700</div></div>
  <div class="row"><div class="lab">lg · title</div><div style="font-size:18px;font-weight:700;color:#334155">バスアプリ</div><div class="meta">18 / 700</div></div>
  <div class="row"><div class="lab">md</div><div style="font-size:15px;font-weight:600;color:#334155">定期券 有効（乗車前）</div><div class="meta">15 / 600</div></div>
  <div class="row"><div class="lab">base</div><div style="font-size:14px;font-weight:500;color:#334155">京都市営バス 京都駅前～金閣寺</div><div class="meta">14 / 500</div></div>
  <div class="row"><div class="lab">sm · body</div><div style="font-size:13px;color:#475569">京都駅前 → 四条烏丸 → 金閣寺</div><div class="meta">13 / 400</div></div>
  <div class="row"><div class="lab">xs</div><div style="font-size:11px;color:#94A3B8">更新時刻: 2026/03/11 14:23</div><div class="meta">11 / 400</div></div>
  <div class="row"><div class="lab">eyebrow</div><div style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:0.05em">ACCOUNT</div><div class="meta">11 / 700</div></div>
</body>
</html>
