<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Table</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: var(--space-6, 24px); background: var(--bg-app, #F8FAFC); font-family: var(--font-sans); }
  .stage { background: var(--color-surface-default, #FFFFFF); border: 1px solid var(--color-border-subtle, #E2E8F0); border-radius: var(--radius-lg, 16px); overflow: hidden; }
  .stage__toolbar { padding: var(--space-4, 16px) var(--space-5, 20px); display: flex; align-items: center; justify-content: space-between; gap: var(--space-3, 12px); flex-wrap: wrap; border-bottom: 1px solid var(--color-border-subtle, #E2E8F0); }
  .stage__title { font-size: var(--text-lg, 18px); font-weight: 700; color: var(--color-text-primary, #0F172A); margin: 0; }
  .stage__actions { display: flex; gap: var(--space-2, 8px); }

  .search { display: flex; align-items: center; gap: var(--space-2, 8px); padding: var(--space-2, 8px) var(--space-3, 12px); background: var(--color-surface-subtle, #F1F5F9); border-radius: 10px; min-width: 240px; }
  .search svg { width: 16px; height: 16px; color: var(--color-text-muted, #64748B); }
  .search input { border: none; background: transparent; outline: none; flex: 1; font-family: inherit; font-size: var(--text-sm, 14px); }

  .btn { padding: var(--space-2, 8px) var(--space-3, 12px); border-radius: 10px; border: 1px solid var(--color-border-subtle, #E2E8F0); background: var(--color-surface-default, #FFFFFF); color: var(--color-text-secondary, #475569); cursor: pointer; font-family: inherit; font-size: var(--text-sm, 14px); font-weight: 600; display: inline-flex; align-items: center; gap: var(--space-2, 8px); }
  .btn:hover { background: var(--color-surface-subtle, #F1F5F9); }
  .btn svg { width: 14px; height: 14px; }
  .btn--primary { background: var(--color-surface-brand, #26B7BC); color: #fff; border-color: transparent; }

  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; padding: var(--space-3, 12px) var(--space-5, 20px); background: var(--color-surface-subtle, #F1F5F9); font-size: var(--text-xs, 12px); font-weight: 700; color: var(--color-text-muted, #64748B); text-transform: uppercase; letter-spacing: var(--tracking-wide); border-bottom: 1px solid var(--color-border-subtle, #E2E8F0); }
  thead th button { background: transparent; border: none; padding: 0; cursor: pointer; color: inherit; font: inherit; display: inline-flex; align-items: center; gap: var(--space-1, 4px); }
  thead th[aria-sort] button { color: var(--color-text-primary, #0F172A); }
  thead th svg { width: 12px; height: 12px; }
  tbody td { padding: var(--space-3, 12px) var(--space-5, 20px); font-size: var(--text-sm, 14px); color: var(--color-text-primary, #0F172A); border-bottom: 1px solid var(--color-border-subtle, #E2E8F0); }
  tbody tr:hover { background: var(--color-surface-subtle, #F1F5F9); }
  tbody tr:last-child td { border-bottom: none; }

  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px var(--space-2, 8px); border-radius: 999px; font-size: var(--text-xs, 12px); font-weight: 600; }
  .pill--success { background: #DCFCE7; color: #166534; }
  .pill--warn    { background: #FEF3C7; color: #92400E; }
  .pill--error   { background: #FEE2E2; color: #991B1B; }
  .pill--default { background: var(--color-surface-subtle, #F1F5F9); color: var(--color-text-muted, #64748B); }

  .footer { padding: var(--space-3, 12px) var(--space-5, 20px); border-top: 1px solid var(--color-border-subtle, #E2E8F0); display: flex; align-items: center; justify-content: space-between; font-size: var(--text-sm, 14px); color: var(--color-text-muted, #64748B); }

  /* 横スクロール可能なテーブル領域 */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table-scroll::after { content: ""; }

  @media (max-width: 600px) {
    body { padding: var(--space-3, 12px); }
    .stage__toolbar { flex-direction: column; align-items: stretch; }
    .stage__actions { flex-wrap: wrap; }
    .search { flex: 1 1 100%; min-width: 0; }
    table { min-width: 640px; }
    .footer { flex-direction: column; gap: var(--space-2, 8px); align-items: stretch; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="stage__toolbar">
      <h2 class="stage__title">運行路線一覧</h2>
      <div class="stage__actions">
        <div class="search"><i data-lucide="search"></i><input placeholder="検索…" value=""></div>
        <button class="btn"><i data-lucide="filter"></i>絞り込み</button>
        <button class="btn btn--primary"><i data-lucide="plus"></i>新規追加</button>
      </div>
    </div>

    <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th scope="col"><input type="checkbox" aria-label="全選択"></th>
          <th scope="col" aria-sort="ascending"><button>路線名 <i data-lucide="chevron-up"></i></button></th>
          <th scope="col"><button>運行区分 <i data-lucide="chevrons-up-down"></i></button></th>
          <th scope="col"><button>状態 <i data-lucide="chevrons-up-down"></i></button></th>
          <th scope="col"><button>本日便数 <i data-lucide="chevrons-up-down"></i></button></th>
          <th scope="col">更新</th>
          <th scope="col" aria-label="操作"></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="checkbox" aria-label="渋谷新宿線を選択"></td>
          <td><strong>渋谷 — 新宿 線</strong></td>
          <td>急行</td>
          <td><span class="pill pill--success"><i data-lucide="circle" style="width:8px;height:8px;fill:currentColor"></i>運行中</span></td>
          <td>48</td>
          <td>3 分前</td>
          <td><button class="btn"><i data-lucide="more-horizontal"></i></button></td>
        </tr>
        <tr>
          <td><input type="checkbox" aria-label="渋谷池袋線を選択"></td>
          <td><strong>渋谷 — 池袋 線</strong></td>
          <td>各停</td>
          <td><span class="pill pill--warn"><i data-lucide="circle" style="width:8px;height:8px;fill:currentColor"></i>遅延の可能性</span></td>
          <td>32</td>
          <td>12 分前</td>
          <td><button class="btn"><i data-lucide="more-horizontal"></i></button></td>
        </tr>
        <tr>
          <td><input type="checkbox" aria-label="渋谷品川線を選択"></td>
          <td><strong>渋谷 — 品川 線</strong></td>
          <td>急行</td>
          <td><span class="pill pill--error"><i data-lucide="circle" style="width:8px;height:8px;fill:currentColor"></i>遅延中</span></td>
          <td>24</td>
          <td>1 分前</td>
          <td><button class="btn"><i data-lucide="more-horizontal"></i></button></td>
        </tr>
        <tr>
          <td><input type="checkbox" aria-label="新宿池袋線を選択"></td>
          <td><strong>新宿 — 池袋 線</strong></td>
          <td>深夜</td>
          <td><span class="pill pill--default"><i data-lucide="circle" style="width:8px;height:8px;fill:currentColor"></i>休止中</span></td>
          <td>0</td>
          <td>2 時間前</td>
          <td><button class="btn"><i data-lucide="more-horizontal"></i></button></td>
        </tr>
      </tbody>
    </table>
    </div>

    <div class="footer">
      <div>4 件中 1–4 を表示</div>
      <div style="display: flex; gap: var(--space-2, 8px); align-items: center;">
        <button class="btn"><i data-lucide="chevron-left"></i></button>
        <button class="btn"><i data-lucide="chevron-right"></i></button>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
