<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バスアプリ — UI Kit</title>
<link rel="stylesheet" href="../../primitives.css">
<link rel="stylesheet" href="../../semantic.css">
<style>
  :root { color-scheme: light; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', system-ui, sans-serif;
    background: linear-gradient(135deg,#E6EEED 0%, #F0F4F4 50%, #E9F0EF 100%);
    color: #1E293B;
    -webkit-font-smoothing: antialiased;
  }
  #root { display: flex; flex-direction: column; min-height: 100vh; }

  @keyframes busapp-fade-in { from { opacity: 0 } to { opacity: 1 } }
  @keyframes busapp-fade-quick { 0% { opacity: 0 } 30% { opacity: 0.6 } 100% { opacity: 0 } }
  @keyframes busapp-modal-in { from { opacity: 0; transform: translateY(20px) scale(0.92) } to { opacity: 1; transform: translateY(0) scale(1) } }
  @keyframes busapp-slide-in { from { transform: translateX(-100%) } to { transform: translateX(0) } }
  @keyframes busapp-pulse {
    0%   { transform: scale(0.5); opacity: 0.6 }
    100% { transform: scale(1.4); opacity: 0   }
  }
  @keyframes busapp-breathe {
    0%, 100% { opacity: 1; transform: scale(1) }
    50%      { opacity: 0.3; transform: scale(0.85) }
  }
  @keyframes busapp-shake {
    0%, 100% { transform: rotate(0) }
    20% { transform: rotate(-8deg) }
    40% { transform: rotate(8deg) }
    60% { transform: rotate(-5deg) }
    80% { transform: rotate(5deg) }
  }

  button { font-family: inherit; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>

  <script type="text/babel" src="./BusappComponents.jsx"></script>
  <script type="text/babel" src="./BusappScreens.jsx"></script>
  <script type="text/babel" src="./BusappApp.jsx"></script>
</body>
</html>
