<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIG Core Design System</title>
  <meta name="description" content="FIGデザインシステムの単一エントリポイント。Foundations / Accessibility / Components / Experience Patterns を Cloudscape 風に俯瞰。">
  <link rel="stylesheet" href="primitives.css">
  <link rel="stylesheet" href="semantic.css">
  <link rel="stylesheet" href="tokens/signature.css">
  <link rel="stylesheet" href="tokens/base.css">
  <link rel="stylesheet" href="tokens/profile-admin.css">
  <link rel="stylesheet" href="tokens/profile-consumer.css">
  <link rel="stylesheet" href="tokens/profile-terminal.css">
  <link rel="stylesheet" href="tokens/components.css">
  <link rel="stylesheet" href="assets/portal.css">
  <!-- Prism.js for syntax highlighting in Tokens & Code panels -->
  <link rel="stylesheet" href="https://unpkg.com/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://unpkg.com/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://unpkg.com/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <script src="https://unpkg.com/prismjs@1.29.0/components/prism-css.min.js"></script>
</head>
<body class="fig-profile-consumer">
  <header class="portal-header" role="banner">
    <a href="#/core/principles/vision" class="portal-brand" aria-label="FIG Core Design System ホーム">
      <span class="portal-brand__mark" aria-hidden="true">FIG</span>
      <span>
        <span class="portal-brand__title">FIG Core DS</span>
        <span class="portal-brand__subtitle">Design System</span>
      </span>
    </a>

    <nav class="portal-scope" aria-label="ガイドライン範囲の切替">
      <button type="button" class="portal-scope__btn" data-scope="core" aria-current="page">Core</button>
      <button type="button" class="portal-scope__btn" data-scope="extensions">Extensions</button>
      <button type="button" class="portal-scope__btn" data-scope="developer">Developer</button>
    </nav>

    <div class="portal-controls" role="group" aria-label="バージョンとデバイスプロファイル">
      <label class="portal-version" aria-label="参照するバージョン">
        <span class="portal-version__label">Version</span>
        <select class="portal-version__select" data-version-selector>
          <option value="v1.2.0" selected>v1.2.0 (Latest)</option>
          <option value="v1.1.0">v1.1.0</option>
          <option value="v1.0.0">v1.0.0</option>
        </select>
        <svg class="portal-version__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </label>

      <div class="portal-profile" role="radiogroup" aria-label="デバイスプロファイル">
        <button type="button" class="portal-profile__btn" data-profile="admin" role="radio" aria-checked="false" title="Web-Admin（PCメイン・情報密度優先）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="14" height="14">
            <rect x="2" y="4" width="20" height="14" rx="2"/><line x1="8" y1="20" x2="16" y2="20"/><line x1="12" y1="18" x2="12" y2="20"/>
          </svg>
          <span>Admin</span>
        </button>
        <button type="button" class="portal-profile__btn" data-profile="consumer" role="radio" aria-checked="true" title="Mobile-Consumer（一般ユーザー向けスマホ・操作性優先）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="14" height="14">
            <rect x="6" y="2" width="12" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/>
          </svg>
          <span>Consumer</span>
        </button>
        <button type="button" class="portal-profile__btn" data-profile="terminal" role="radio" aria-checked="false" title="Mobile-Terminal（業務用端末・固定視認性）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="14" height="14">
            <rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>Terminal</span>
        </button>
      </div>
    </div>

    <div class="portal-search">
      <svg class="portal-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="search" class="portal-search__input" placeholder="ドキュメント検索…" aria-label="ドキュメント検索（Ctrl+K）">
      <span class="portal-search__hint" aria-hidden="true">⌘K</span>
    </div>

    <button type="button" class="portal-menu-toggle" aria-label="メニューを開く">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </header>

  <div class="portal-body">
    <nav class="portal-sidebar" role="navigation" aria-label="主ナビゲーション" data-open="false">
      <!-- generated by portal.js -->
    </nav>
    <div class="portal-sidebar-scrim" data-open="false" aria-hidden="true"></div>
    <main class="portal-main" role="main">
      <!-- generated by portal.js -->
    </main>
  </div>

  <!-- 検索オーバーレイ -->
  <div class="search-overlay" data-open="false" role="dialog" aria-modal="true" aria-label="ドキュメント検索">
    <div class="search-panel">
      <div class="search-panel__input-wrap">
        <svg class="search-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="search" class="search-panel__input" placeholder="トピック・コンポーネント・トークンを検索…" aria-label="検索クエリ">
      </div>
      <ul class="search-results" role="listbox" aria-label="検索結果"></ul>
    </div>
  </div>

  <!-- portal-content.js を先に読み込み、グローバル window.PortalContent を準備 -->
  <script src="assets/js/portal-content.js"></script>
  <script src="assets/js/portal.js"></script>
  <!-- AI Co-creation ページの Interactive Prompt Generator 用 -->
  <script src="assets/js/ai-co-creation.js"></script>
</body>
</html>
