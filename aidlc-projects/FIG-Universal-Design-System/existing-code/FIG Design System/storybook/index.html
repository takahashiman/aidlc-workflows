<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Storybook — Busapp Design System</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: #0F172A;
    color: #F8FAFC;
    overflow: hidden;
    height: 100vh;
  }

  .layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

  /* ── Sidebar ──────────────────────────────────────── */
  .sidebar {
    background: #0F172A;
    color: #F8FAFC;
    border-right: 1px solid #1E293B;
    overflow-y: auto;
    padding: var(--space-5);
  }
  .sb-brand {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding-bottom: var(--space-5);
    border-bottom: 1px solid #1E293B;
    margin-bottom: var(--space-5);
  }
  .sb-brand-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #34D399, #26B7BC);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: #fff;
    font-size: 16px;
  }
  .sb-brand-text { display: flex; flex-direction: column; gap: 2px; }
  .sb-brand-name { font-weight: 700; font-size: 14px; }
  .sb-brand-tag  { font-family: var(--font-mono); font-size: 10px; color: #64748B; }

  .sb-nav-group { margin-bottom: var(--space-5); }
  .sb-nav-heading {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: var(--tracking-widest);
    color: #64748B;
    font-weight: 700;
    margin-bottom: var(--space-2);
    padding: 0 var(--space-2);
  }
  .sb-nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-sm, 6px);
    color: #CBD5E1;
    text-decoration: none;
    font-size: 13px;
    cursor: pointer;
    transition: background 120ms ease;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .sb-nav-item:hover { background: #1E293B; color: #F8FAFC; }
  .sb-nav-item.active { background: #26B7BC; color: #fff; }
  .sb-nav-item-icon {
    font-family: var(--font-mono);
    font-size: 10px;
    color: #64748B;
    width: 14px;
    flex-shrink: 0;
  }
  .sb-nav-item.active .sb-nav-item-icon { color: #A7F3D0; }

  .sb-nav-status {
    margin-left: auto;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sb-nav-status--impl  { background: #34D399; }
  .sb-nav-status--spec  { background: #FCD34D; }
  .sb-nav-status--todo  { background: #94A3B8; }

  /* ── Main area ────────────────────────────────────── */
  .main {
    display: grid;
    grid-template-rows: 56px 1fr;
    background: #F8FAFC;
  }
  .toolbar {
    background: #fff;
    border-bottom: 1px solid #E2E8F0;
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 0 var(--space-5);
  }
  .toolbar-title {
    font-size: 13px;
    font-weight: 600;
    color: #0F172A;
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .toolbar-crumb { color: #94A3B8; font-weight: 500; }
  .toolbar-spacer { flex: 1; }
  .toolbar-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: #64748B;
    background: #F1F5F9;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .toolbar-link {
    text-decoration: none;
    color: #26B7BC;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #E2E8F0;
    background: #fff;
  }
  .toolbar-link:hover { background: #F1F5F9; }

  .frame-wrap { position: relative; }
  iframe { width: 100%; height: 100%; border: 0; background: #F8FAFC; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-mark">B</div>
      <div class="sb-brand-text">
        <div class="sb-brand-name">Busapp DS</div>
        <div class="sb-brand-tag">v0.4 · storybook</div>
      </div>
    </div>

    <nav id="nav"></nav>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="toolbar-title" id="crumb">
        <span class="toolbar-crumb">Storybook</span>
        <span>›</span>
        <span id="crumb-section">Tokens</span>
        <span>›</span>
        <span id="crumb-item">Colors — Brand</span>
      </div>
      <div class="toolbar-spacer"></div>
      <span class="toolbar-tag" id="meta-tag">spec + impl</span>
      <a class="toolbar-link" id="open-new" href="#" target="_blank" rel="noopener">Open in new tab ↗</a>
    </div>
    <div class="frame-wrap">
      <iframe id="frame" src="components/button.html" title="Preview"></iframe>
    </div>
  </main>
</div>

<script>
const NAV = [
  {
    group: 'Tokens',
    items: [
      { id: 'tok-color',      label: 'Colors',       src: '../preview/colors-brand.html',          status: 'impl', tag: 'token' },
      { id: 'tok-color-n',    label: 'Neutrals',     src: '../preview/colors-neutrals.html',       status: 'impl', tag: 'token' },
      { id: 'tok-color-s',    label: 'Status Colors',src: '../preview/colors-status.html',         status: 'impl', tag: 'token' },
      { id: 'tok-type',       label: 'Typography',   src: 'tokens/typography.html',                status: 'impl', tag: 'token' },
      { id: 'tok-space',      label: 'Spacing & Radii', src: '../preview/spacing-radii.html',      status: 'impl', tag: 'token' },
      { id: 'tok-elev',       label: 'Elevation',    src: 'tokens/elevation.html',                 status: 'impl', tag: 'token' },
      { id: 'tok-motion',     label: 'Motion',       src: 'tokens/motion.html',                    status: 'impl', tag: 'token' },
      { id: 'tok-z',          label: 'Z-index',      src: '../preview/z-index.html',               status: 'impl', tag: 'token' },
      { id: 'tok-state',      label: 'State Tokens', src: '../preview/state-tokens.html',          status: 'impl', tag: 'token' },
      { id: 'tok-semantic',   label: 'Semantic Map', src: '../preview/semantic-tokens.html',       status: 'impl', tag: 'token' },
    ]
  },
  {
    group: 'Components',
    items: [
      { id: 'cmp-button',     label: 'Button',       src: 'components/button.html',         status: 'spec', tag: 'spec + partial impl' },
      { id: 'cmp-card',       label: 'Card',         src: 'components/card.html',           status: 'spec', tag: 'spec + impl' },
      { id: 'cmp-header',     label: 'Header',       src: 'components/header.html',         status: 'impl', tag: 'spec + impl' },
      { id: 'cmp-sidebar',    label: 'Sidebar Drawer', src: 'components/sidebar.html',      status: 'impl', tag: 'spec + impl' },
      { id: 'cmp-pill',       label: 'Status Pill',  src: 'components/status-pill.html',    status: 'spec', tag: 'spec + impl' },
      { id: 'cmp-tab',        label: 'Tab',          src: 'components/tab.html',            status: 'spec', tag: 'spec + impl' },
      { id: 'cmp-list',       label: 'List Item',    src: 'components/list-item.html',      status: 'spec', tag: 'spec + impl' },
      { id: 'cmp-bottom',     label: 'Bottom Nav',   src: 'components/bottom-nav.html',     status: 'todo', tag: 'spec only' },
    ]
  },
  {
    group: 'Patterns',
    items: [
      { id: 'pat-route',      label: 'Route Card',         src: 'patterns/route-card.html',         status: 'impl', tag: 'pattern (new)' },
      { id: 'pat-arrival',    label: 'Arrival Card',       src: 'patterns/arrival-card.html',       status: 'spec', tag: 'pattern' },
      { id: 'pat-delay',      label: 'Delay Banner',       src: 'patterns/delay-banner.html',       status: 'todo', tag: 'pattern' },
      { id: 'pat-selector',   label: 'Route Selector',     src: 'patterns/route-selector.html',     status: 'todo', tag: 'pattern' },
      { id: 'pat-notif',      label: 'Notification Sheet', src: 'patterns/notification-sheet.html', status: 'todo', tag: 'pattern' },
    ]
  },
  {
    group: 'Reference',
    items: [
      { id: 'ref-portal',     label: 'Portal',         src: '../index.html',                          status: 'impl', tag: 'doc' },
      { id: 'ref-material',   label: 'Material Theme', src: '../preview/material-theme-mapping.html', status: 'impl', tag: 'doc' },
      { id: 'ref-transport',  label: 'Transport Tokens', src: '../preview/transport-domain-tokens.html', status: 'impl', tag: 'doc' },
    ]
  }
];

const navEl = document.getElementById('nav');
const frame = document.getElementById('frame');
const crumbSection = document.getElementById('crumb-section');
const crumbItem = document.getElementById('crumb-item');
const metaTag = document.getElementById('meta-tag');
const openNew = document.getElementById('open-new');

NAV.forEach(group => {
  const wrap = document.createElement('div');
  wrap.className = 'sb-nav-group';
  const h = document.createElement('div');
  h.className = 'sb-nav-heading';
  h.textContent = group.group;
  wrap.appendChild(h);
  group.items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'sb-nav-item';
    btn.dataset.id = item.id;
    btn.dataset.section = group.group;
    btn.dataset.label = item.label;
    btn.dataset.src = item.src;
    btn.dataset.tag = item.tag;
    btn.innerHTML = `
      <span class="sb-nav-item-icon">${group.group === 'Tokens' ? '⊙' : group.group === 'Components' ? '◆' : group.group === 'Patterns' ? '☷' : '✎'}</span>
      <span>${item.label}</span>
      <span class="sb-nav-status sb-nav-status--${item.status}" title="${item.status}"></span>
    `;
    btn.addEventListener('click', () => select(btn));
    wrap.appendChild(btn);
  });
  navEl.appendChild(wrap);
});

function select(btn) {
  document.querySelectorAll('.sb-nav-item.active').forEach(a => a.classList.remove('active'));
  btn.classList.add('active');
  frame.src = btn.dataset.src;
  crumbSection.textContent = btn.dataset.section;
  crumbItem.textContent = btn.dataset.label;
  metaTag.textContent = btn.dataset.tag;
  openNew.href = btn.dataset.src;
  history.replaceState(null, '', '#' + btn.dataset.id);
}

// Initial select: hash or first component
const hash = location.hash.slice(1);
const initial = (hash && document.querySelector(`.sb-nav-item[data-id="${hash}"]`))
  || document.querySelector('.sb-nav-item[data-id="cmp-button"]');
if (initial) select(initial);
</script>
</body>
</html>
