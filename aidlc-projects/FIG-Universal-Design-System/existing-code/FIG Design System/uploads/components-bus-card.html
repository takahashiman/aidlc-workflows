<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Components — Bus Card (FIG Sense)</title>
<link rel="stylesheet" href="../primitives.css">
<link rel="stylesheet" href="../semantic.css">
<script src="https://unpkg.com/lucide@0.487.0/dist/umd/lucide.min.js"></script>
<style>
  body {
    margin: 0;
    padding: var(--space-5);
    background: var(--bg-app);
    font-family: var(--font-sans);
  }
  /* .card-fig は semantic.css が既定 — ここでは内側構造のみ定義 */
  .card-fig {
    max-width: 520px;
  }
  .head {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    margin-bottom: var(--space-3);
  }
  .bub {
    background:    var(--color-surface-accent-subtle);
    color:         var(--color-icon-accent);
    padding:       var(--space-2-5, 10px);
    border-radius: var(--radius-icon-tile);
    flex-shrink:   0;
    display:       inline-flex;
  }
  .bub svg { width: 20px; height: 20px; }
  .name {
    font: var(--typography-body-strong);
    color: var(--color-text-primary);
  }
  .route {
    font: var(--typography-caption);
    color: var(--color-text-muted);
    display: flex;
    gap: var(--space-1);
    align-items: flex-start;
    margin-top: var(--space-1);
  }
  .route svg { width: 14px; height: 14px; margin-top: 2px; flex-shrink: 0; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    padding: var(--layout-control-padding-block-compact) var(--layout-control-padding-inline-compact);
    border-radius: var(--radius-pill-status);
    background: var(--color-status-delayRisk-bg);
    color: var(--color-status-delayRisk-fg);
    font: var(--typography-status-pill);
    margin-bottom: var(--space-3);
  }
  .pill svg { width: 16px; height: 16px; }
  .msg {
    background: var(--color-surface-container-low);
    border-radius: var(--radius-card-compact);
    padding: var(--space-3);
    display: flex;
    gap: var(--space-2);
    align-items: flex-start;
    font: var(--typography-caption);
    color: var(--color-text-secondary);
    line-height: var(--lh-jp-body);
  }
  .msg svg { width: 16px; height: 16px; color: var(--color-icon-default); flex-shrink: 0; margin-top: 1px; }
  .meta {
    padding-top: var(--space-3);
    margin-top: var(--space-3);
    border-top: 1px solid var(--color-border-subtle);
    font: var(--typography-caption);
    color: var(--color-text-muted);
  }
</style>
</head>
<body>
  <div class="card-fig">
    <div class="head">
      <div class="bub"><i data-lucide="bus"></i></div>
      <div>
        <div class="name">京都市営バス 京都駅前～清水寺</div>
        <div class="route"><i data-lucide="map-pin"></i><span>京都駅前 → 五条坂 → 清水寺</span></div>
      </div>
    </div>
    <div class="pill"><i data-lucide="clock"></i>約18分遅延</div>
    <div class="msg"><i data-lucide="info"></i><span>観光客の混雑により、大幅な遅延が発生しております。</span></div>
    <div class="meta">更新時刻: 2026/03/11 14:18</div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
